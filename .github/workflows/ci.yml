name: CI — Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify output
        run: |
          test -f _site/index.html || (echo "❌ Missing index.html" && exit 1)
          test -f _site/css/styles.css || (echo "❌ Missing styles.css" && exit 1)
          test -f _site/sitemap.xml || (echo "❌ Missing sitemap.xml" && exit 1)
          PAGE_COUNT=$(find _site -name "*.html" | wc -l)
          echo "✅ Build produced $PAGE_COUNT HTML pages"
